name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - "LANDING.md"
      - "README.md"
      - "oranda.json"
      - "static/**"
      - "scripts/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install oranda
        run: cargo install oranda --locked --version 0.6.5
      - name: Build oranda site
        run: bash scripts/build-site.sh
      - name: Fetch install scripts from latest release
        run: |
          curl -fsSL "https://github.com/W-Mai/atman/releases/latest/download/atman-cli-installer.sh" -o public/install.sh
          chmod +x public/install.sh
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
